<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>moviemuse_jellyfin</title>
  <style>
    :root {
      --mm-primary: #FF385C;
      --mm-primary-hover: #E00B41;
      --mm-primary-soft: #FFF0F3;
      --mm-success: #008A05;
      --mm-danger: #D92D20;
      --mm-text: #222222;
      --mm-muted: #6A6A6A;
      --mm-border: #DDDDDD;
      --mm-surface: #F7F7F7;
      color: var(--mm-text);
      background: #FFFFFF;
      font-family: "Airbnb Cereal VF", Inter, "HarmonyOS Sans SC", MiSans, system-ui, sans-serif;
    }
    body {
      width: 326px;
      margin: 0;
      padding: 12px;
      background: #FFFFFF;
    }
    main {
      display: grid;
      gap: 10px;
    }
    header {
      display: grid;
      gap: 3px;
      padding-bottom: 2px;
    }
    h1 {
      margin: 0;
      color: var(--mm-primary);
      font-size: 14px;
      font-weight: 650;
      line-height: 1.2;
    }
    #context {
      overflow: hidden;
      min-height: 16px;
      color: var(--mm-muted);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    button {
      min-height: 32px;
      border: 1px solid var(--mm-border);
      border-radius: 8px;
      background: #fff;
      color: var(--mm-text);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 550;
      transition: background .16s ease, border-color .16s ease, color .16s ease, transform .16s ease;
    }
    button:hover {
      border-color: var(--mm-primary);
      color: var(--mm-primary);
    }
    button.primary {
      border-color: var(--mm-primary);
      background: var(--mm-primary);
      color: #fff;
    }
    button.primary:hover {
      border-color: var(--mm-primary-hover);
      background: var(--mm-primary-hover);
      color: #fff;
    }
    button:disabled {
      cursor: wait;
      opacity: .52;
    }
    .settings {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--mm-border);
      border-radius: 8px;
      background: var(--mm-surface);
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--mm-muted);
      font-size: 11px;
      font-weight: 550;
    }
    input {
      min-height: 30px;
      box-sizing: border-box;
      border: 1px solid var(--mm-border);
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
      color: var(--mm-text);
      font: inherit;
      font-size: 12px;
      outline: none;
    }
    input:focus {
      border-color: var(--mm-primary);
      box-shadow: 0 0 0 2px var(--mm-primary-soft);
    }
    #save {
      justify-self: end;
      min-height: 30px;
      padding: 0 12px;
      background: #fff;
    }
    #status {
      min-height: 16px;
      color: var(--mm-muted);
      font-size: 11px;
    }
    #status[data-tone="ok"] {
      color: var(--mm-success);
    }
    #status[data-tone="error"] {
      color: var(--mm-danger);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>moviemuse_jellyfin</h1>
      <div id="context">读取当前 Jellyfin 页面...</div>
    </header>
    <div class="actions">
      <button id="subtitle" type="button">发送字幕</button>
      <button id="transcode" class="primary" type="button">发送转码</button>
    </div>
    <section class="settings">
      <label>
        MovieMuse API
        <input id="apiBase" placeholder="http://127.0.0.1:18183">
      </label>
      <label>
        API Key
        <input id="apiKey" type="password" autocomplete="off" placeholder="未设置 token 可留空">
      </label>
      <button id="save" type="button">保存 API</button>
    </section>
    <div id="status" role="status"></div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
